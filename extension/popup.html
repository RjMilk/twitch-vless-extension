<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; connect-src 'self' https://id.twitch.tv https://api.twitch.tv https://id.twitch.tv/oauth2 https://id.twitch.tv/oauth2/token;" />
  <title>VLESS (Selected Sites)</title>
  </head>
<body>
  <div class="row between">
    <div class="title">VLESS (Selected Sites)</div>
    <div id="twitchStatus" class="pill">…</div>
  </div>

  <div class="row gap">
    <button id="signin">Sign in Twitch</button>
    <button id="signout">Sign out</button>
  </div>

  <div class="hint">Proxy works only if you follow the target channel.</div>

  <label class="toggle">
    <input type="checkbox" id="enabled">
    <span>Enable proxy (PAC)</span>
  </label>

  <div class="hint">Each line is a domain (supports <code>*.example.com</code>).</div>
  <textarea id="domains" placeholder="example.com&#10;*.sub.example.com"></textarea>

  <div class="row gap">
    <button id="save">Save</button>
    <button id="addCurrent">Add current site</button>
    <button id="clear">Clear</button>
  </div>

  <hr>

  <div class="row gap">
    <button id="startXray">Start xray</button>
    <button id="stopXray">Stop xray</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
